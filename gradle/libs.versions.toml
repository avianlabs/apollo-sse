[versions]
# Android Sdk
androidCompileSdk = "35"
androidMinSdk = "24"

# Plugins
androidGradle = "9.2.0"
dokka = "2.1.0"
kotlin = "2.3.20"
mavenPublish = "0.36.0"

# Libraries
apollo = "5.0.0"
kotlinxCoroutines = "1.10.2"
okhttp = "5.3.2"

[libraries]
apollo-runtime = { module = "com.apollographql.apollo:apollo-runtime", version.ref = "apollo" }
coroutinesCore = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-core", version.ref = "kotlinxCoroutines" }

# Test Libs
coroutinesTest = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-test", version.ref = "kotlinxCoroutines" }
kotlinTest = { module = "org.jetbrains.kotlin:kotlin-test", version.ref = "kotlin" }
okhttp-mockWebServer = { module = "com.squareup.okhttp3:mockwebserver", version.ref = "okhttp" }

[plugins]
androidKotlinMultiplatformLib = { id = "com.android.kotlin.multiplatform.library", version.ref = "androidGradle" }
dokka = { id = "org.jetbrains.dokka", version.ref = "dokka" }
kotlinMultiplatform = { id = "org.jetbrains.kotlin.multiplatform", version.ref = "kotlin" }
mavenPublish = { id = "com.vanniktech.maven.publish", version.ref = "mavenPublish" }
